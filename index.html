<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<header>
    <nav>
        <div class="container">
            <img src="./img/logo (2).svg" alt="" class="nav_logo">
            <img src="./img/savat.svg" alt="" class="nav_savat">
        </div>
    </nav>
</header>

<main>
    <section class="category">
        <div class="container">
            <div class="categ_list">
                <div class="categ_item" >
                    <img src="./img/Fire.svg" alt="" class="categ_item_img">
                    <h4 class="categ_item_title">Акции</h4>
                </div>
                <div class="categ_item" id="pizza_btn">
                    <img src="./img/Pizza.svg" alt="" class="categ_item_img">
                    <h4 class="categ_item_title">Пицца</h4>
                </div>
                <div class="categ_item" id="sushi_btn">
                    <img src="./img/Sushi.svg" alt="" class="categ_item_img">
                    <h4 class="categ_item_title">Суши</h4>
                </div>
                <div class="categ_item">
                    <img src="./img/Drink.svg" alt="" class="categ_item_img">
                    <h4 class="categ_item_title">Напитки</h4>
                </div>
                <div class="categ_item">
                    <img src="./img/Snacks.svg" alt="" class="categ_item_img">
                    <h4 class="categ_item_title">Закуски</h4>
                </div>
                <div class="categ_item">
                    <img src="./img/Combo.svg" alt="" class="categ_item_img">
                    <h4 class="categ_item_title">Комбо</h4>
                </div>
                <div class="categ_item">
                    <img src="./img/Dessert.svg" alt="" class="categ_item_img">
                    <h4 class="categ_item_title">Десерты</h4>
                </div>
                <div class="categ_item">
                    <img src="./img/Sauce.svg" alt="" class="categ_item_img">
                    <h4 class="categ_item_title">Соусы</h4>
                </div>
            </div>

            <div class="categ_content">
                <img src="./img/pizza box 1.png" alt="" class="categ_content_img">
                <img src="./img/pizza box 2.png" alt="" class="categ_content_img">
                <img src="./img/pizza box 3.png" alt="" class="categ_content_img">
                <img src="./img/pizza box 4.png" alt="" class="categ_content_img">
            </div>


            <div class="categ_box">
                <h2 class="categ_title">Проверить адрес доставки</h2>
                <input placeholder="Адрес" type="search" name="" id="" class="categ_search">
                <button class="categ_btn">Проверить</button>
            </div>
        </div>
    </section>

    <section class="pizza">
        <div class="container">
            <h2 class="pizza_title">Пицца</h2>
            <div class="pizza_list" id="pizza_list"></div>
        </div>
    </section>

    
    <section class="sushi">
        <div class="container">
            <h2 class="sushi_title">Суши</h2>
            <div class="sushi_list" id="sushi_list"></div>
        </div>
    </section>



</main>


<div id="cards"></div>


    <script src="./main.js"></script>
</body>
</html>
